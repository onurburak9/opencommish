name: Claude Code Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Trigger when @claude is mentioned
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    
    runs-on: ubuntu-latest
    
    # Run all steps inside the pre-built dev container with Claude Code CLI,
    # Node.js, Python 3.11, uv, pnpm, gh CLI, and Docker CLI pre-installed.
    container:
      image: ghcr.io/infinitusai/agent-builder/development:latest
      options: --user root
    
    permissions:
      packages: read        # Pull the dev container image from GHCR
      actions: read         # Required for github_ci MCP server
      contents: write       # Allow Claude to make code changes
      issues: write         # Allow Claude to comment on issues
      pull-requests: write  # Allow Claude to comment on PRs
    
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEVELOPER_AGENT_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_AGENT_APP_KEY }}
      
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY_GITHUB }}
          github_token: ${{ steps.app-token.outputs.token }}
          model: claude-opus-4-6
          # Configure allowed tools for Claude Code
          claude_args: |
            --allowedTools "Edit,Write,TodoWrite,Task,View,GlobTool,GrepTool,BatchTool,WebFetch,WebSearch,Bash(curl:*),Bash(git:*),Bash(gh:*),Bash(uv:*),Bash(make:*),Bash(docker:*),Bash(pnpm:*),Bash(node:*),Bash(jq:*),Bash(gcloud:*)"
          # Pass environment variables to Claude Code
          settings: |
            {
              "env": {
                "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS": "1"
              }
            }
