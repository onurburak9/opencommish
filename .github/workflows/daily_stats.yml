name: Daily Fantasy Stats Collection

on:
  schedule:
    # Runs at 11:30 PM PST daily (7:30 AM UTC next day)
    - cron: '30 7 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  collect_stats:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create token.json for yfpy
        run: |
          mkdir -p cron
          cat > cron/token.json << EOF
          {
            "access_token": "",
            "consumer_key": "${{ secrets.YAHOO_CLIENT_ID }}",
            "consumer_secret": "${{ secrets.YAHOO_CLIENT_SECRET }}",
            "guid": null,
            "refresh_token": "${{ secrets.YAHOO_REFRESH_TOKEN }}",
            "token_time": 0,
            "token_type": "bearer"
          }
          EOF
      
      - name: Run stats collection
        env:
          YAHOO_CONSUMER_KEY: ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CONSUMER_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
        run: |
          python3 cron/fetch_daily_stats.py
      
      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/daily_stats/*.json
          git diff --staged --quiet || git commit -m "Daily stats: $(date +'%Y-%m-%d %H:%M:%S UTC')"
          git push
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Stats collection completed successfully"
      
      - name: Print failure message
        if: failure()
        run: |
          echo "❌ Stats collection failed - check logs above"
          echo "View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
