name: Daily Fantasy Stats Collection

on:
  schedule:
    # Runs at 3:00 AM PT daily (11:00 AM UTC - fetches previous day's stats)
    - cron: '0 11 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

permissions:
  contents: write       # Required to push to main

jobs:
  collect_stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stats collection
        env:
          YAHOO_CLIENT_ID: ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          YAHOO_ACCESS_TOKEN: ${{ secrets.YAHOO_ACCESS_TOKEN }}
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
          YAHOO_TOKEN_TIME: ${{ secrets.YAHOO_TOKEN_TIME }}
          YAHOO_TOKEN_TYPE: bearer
          YAHOO_GUID: None
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
        run: |
          DATE=$(TZ='America/Los_Angeles' date -d 'yesterday' +'%Y-%m-%d')
          python3 cron/fetch_daily_stats.py "${DATE}"

      - name: Commit and push to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(TZ='America/Los_Angeles' date -d 'yesterday' +'%Y-%m-%d')

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/daily_stats/*.json

          if git diff --staged --quiet; then
            echo "No new stats data to commit."
            exit 0
          fi

          git commit -m "Daily stats: ${DATE}"
          git push origin main

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Stats collection completed successfully"

      - name: Print failure message
        if: failure()
        run: |
          echo "❌ Stats collection failed - check logs above"
          echo "View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
