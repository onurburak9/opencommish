name: Integration Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    name: Build Dashboard Docker Image
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t opencommish-dashboard:latest ./dashboard

      - name: Test Docker image runs
        run: |
          docker run -d --name test-dashboard -p 8501:8501 \
            -v $(pwd)/data:/app/data \
            opencommish-dashboard:latest
          
          # Wait for health check
          sleep 30
          
          # Check if container is healthy
          docker ps | grep test-dashboard
          
          # Test endpoint
          curl -f http://localhost:8501 || exit 1
          
          # Cleanup
          docker stop test-dashboard
          docker rm test-dashboard

  # Playwright tests are optional and skip if no data available
  playwright-tests:
    runs-on: ubuntu-latest
    name: Playwright Browser Tests
    continue-on-error: true  # Don't fail PR if tests can't run
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dashboard/requirements.txt
          pip install -r tests/integration/requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Run Playwright tests
        run: |
          pytest tests/integration/ -v --browser chromium --headed=false || echo "Tests skipped or failed - check logs"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          if-no-files-found: ignore
