name: Kimi K2.5 AI Assistant

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  pull_request:
    types: [opened, edited, synchronize]
  pull_request_review_comment:
    types: [created, edited]

jobs:
  kimi-assist:
    runs-on: ubuntu-latest
    name: Kimi K2.5 AI Assistant
    # Only run if @kimi is mentioned - check all possible body fields
    if: |
      contains(github.event.issue.body, '@kimi') || contains(github.event.issue.body, '@Kimi') ||
      contains(github.event.comment.body, '@kimi') || contains(github.event.comment.body, '@Kimi') ||
      contains(github.event.pull_request.body, '@kimi') || contains(github.event.pull_request.body, '@Kimi') ||
      contains(github.event.pull_request_review_comment.body, '@kimi') || contains(github.event.pull_request_review_comment.body, '@Kimi')
    
    permissions:
      contents: read      # Read codebase
      issues: write       # Comment on issues and add reactions
      pull-requests: write # Comment on PRs, create PRs, and add reactions
      actions: read       # Read workflow info
      
    steps:
      - name: Add processing reaction
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let commentId = null;
            
            // Try to get comment ID based on event type
            if (eventName === 'issue_comment') {
              commentId = context.payload.comment?.id;
            } else if (eventName === 'pull_request_review_comment') {
              commentId = context.payload.comment?.id;
            }
            
            // If we have a comment ID, add a reaction
            if (commentId) {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                content: 'eyes'
              });
              console.log('Added 👀 reaction to comment');
            } else {
              console.log('No comment to react to (issue/PR body mention)');
            }

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for context

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests PyGithub

      - name: Process Kimi Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          OPENCLAW_GATEWAY_URL: ${{ secrets.OPENCLAW_GATEWAY_URL }}
          OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || github.event.pull_request_review_comment.pull_request_number }}
          ISSUE_BODY: ${{ github.event.issue.body || github.event.comment.body || github.event.pull_request.body || github.event.pull_request_review_comment.body }}
          COMMENT_BODY: ${{ github.event.comment.body || github.event.pull_request_review_comment.body }}
          COMMENT_ID: ${{ github.event.comment.id || github.event.pull_request_review_comment.id }}
          EVENT_TYPE: ${{ github.event_name }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ACTOR: ${{ github.actor }}
        run: |
          python .github/scripts/kimi_handler.py
