name: Daily Projected Stats Collection

on:
  schedule:
    # Runs at 12:00 PM PST daily (8:00 PM UTC)
    - cron: '0 20 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

permissions:
  contents: write  # Required to push commits

jobs:
  collect_projected_stats:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run projected stats collection
        env:
          YAHOO_CONSUMER_KEY: ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CONSUMER_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          YAHOO_ACCESS_TOKEN: ${{ secrets.YAHOO_ACCESS_TOKEN }}
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
          YAHOO_TOKEN_TIME: ${{ secrets.YAHOO_TOKEN_TIME }}
          YAHOO_TOKEN_TYPE: bearer
          YAHOO_GUID: None
        run: |
          python3 cron/fetch_projected_stats.py
      
      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/projected_stats/*.json
          # Use PST timezone to match the game date (not UTC)
          git diff --staged --quiet || git commit -m "Projected stats: $(TZ='America/Los_Angeles' date +'%Y-%m-%d')"
          git push
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Projected stats collection completed successfully"
      
      - name: Print failure message
        if: failure()
        run: |
          echo "❌ Projected stats collection failed - check logs above"
          echo "View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
