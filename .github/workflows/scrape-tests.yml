name: Scrape Job Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Scrape Job Unit Tests
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v

  # Validation tests require Yahoo API credentials and existing data
  # Run conditionally only when secrets are available
  validation-tests:
    runs-on: ubuntu-latest
    name: Projected Stats Validation
    needs: unit-tests
    # Only run if Yahoo secrets are available (not on forks without secrets)
    if: github.repository == 'onurburak9/opencommish' && github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API fetch for validation
        env:
          YAHOO_CONSUMER_KEY: ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CONSUMER_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          YAHOO_ACCESS_TOKEN: ${{ secrets.YAHOO_ACCESS_TOKEN }}
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
          YAHOO_TOKEN_TIME: ${{ secrets.YAHOO_TOKEN_TIME }}
          YAHOO_TOKEN_TYPE: bearer
        run: |
          python cron/fetch_projected_stats_api.py

      - name: Validate against scraped data
        run: |
          python cron/validate_projected_stats.py || true

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: data/validation_reports/
          if-no-files-found: ignore
